server:
  port: 8082

spring:
  application:
    name: inventory-service
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: inventory-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.events"

# --- Production Observability (Actuator & Micrometer) ---
management:
  endpoints:
    web:
      exposure:
        # Expose essential endpoints for production monitoring
        include: health, info, prometheus, metrics
  endpoint:
    health:
      # Enable liveness and readiness probes (vital for Kubernetes/container orchestration)
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      # Add a global tag so metrics can be filtered by this specific app in Prometheus/Grafana
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        # Enable histograms for HTTP requests to allow calculating accurate percentiles (P95, P99) in Grafana
        http.server.requests: true
  otlp:
    metrics:
      export:
        enabled: true
    tracing:
      export:
        enabled: true
  tracing:
    sampling:
      # Production sampling rate (e.g., 0.1 means 10% of requests are traced to reduce overhead)
      # You can set this to 1.0 (100%) if traffic is low, but usually it's scaled down in prod.
      probability: 0.1